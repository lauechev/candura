<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- transparent background -->

  <!-- shadow -->
  <rect x="5" y="24" width="22" height="1" fill="#8f877d" opacity="0.35"/>

  <!-- envelope body -->
  <rect x="4" y="10" width="24" height="14" fill="#e8dccb"/>
  <rect x="4" y="10" width="24" height="1" fill="#f4ebdf"/>
  <rect x="4" y="23" width="24" height="1" fill="#c7b8a3"/>

  <!-- side edges -->
  <rect x="4" y="10" width="1" height="14" fill="#d8cab7"/>
  <rect x="27" y="10" width="1" height="14" fill="#b8a992"/>

  <!-- top flap -->
  <rect x="5" y="11" width="22" height="1" fill="#efe4d6"/>
  <rect x="6" y="12" width="20" height="1" fill="#efe4d6"/>
  <rect x="7" y="13" width="18" height="1" fill="#eadf30"/>
  <rect x="8" y="14" width="16" height="1" fill="#eadf30"/>
  <rect x="9" y="15" width="14" height="1" fill="#eadf30"/>
  <rect x="10" y="16" width="12" height="1" fill="#e0d3bf"/>

  <!-- inner folds -->
  <rect x="5" y="22" width="1" height="1" fill="#cbbca8"/>
  <rect x="6" y="21" width="1" height="1" fill="#cbbca8"/>
  <rect x="7" y="20" width="1" height="1" fill="#cbbca8"/>
  <rect x="8" y="19" width="1" height="1" fill="#cbbca8"/>
  <rect x="9" y="18" width="1" height="1" fill="#cbbca8"/>
  <rect x="10" y="17" width="1" height="1" fill="#cbbca8"/>
  <rect x="11" y="16" width="1" height="1" fill="#cbbca8"/>

  <rect x="26" y="22" width="1" height="1" fill="#b9aa96"/>
  <rect x="25" y="21" width="1" height="1" fill="#b9aa96"/>
  <rect x="24" y="20" width="1" height="1" fill="#b9aa96"/>
  <rect x="23" y="19" width="1" height="1" fill="#b9aa96"/>
  <rect x="22" y="18" width="1" height="1" fill="#b9aa96"/>
  <rect x="21" y="17" width="1" height="1" fill="#b9aa96"/>
  <rect x="20" y="16" width="1" height="1" fill="#b9aa96"/>

  <!-- bottom flap -->
  <rect x="6" y="22" width="20" height="1" fill="#d9ccb9"/>
  <rect x="7" y="21" width="18" height="1" fill="#ded1bf"/>
  <rect x="8" y="20" width="16" height="1" fill="#e4d8c7"/>
  <rect x="9" y="19" width="14" height="1" fill="#eadf30"/>
  <rect x="10" y="18" width="12" height="1" fill="#eadf30"/>
  <rect x="11" y="17" width="10" height="1" fill="#efe4d6"/>

  <!-- small heart seal -->
  <rect x="15" y="16" width="2" height="1" fill="#ed5e99"/>
  <rect x="14" y="17" width="4" height="1" fill="#ed5e99"/>
  <rect x="15" y="18" width="2" height="1" fill="#c94b80"/>
</svg>